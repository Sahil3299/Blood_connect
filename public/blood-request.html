<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Blood Request - BloodConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="design.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>
    <div class="shell">
        <header class="header">
            <div class="container">
                <div class="header-inner"><a href="index.html" class="logo"><span class="logo-mark"><i
                                class="bi bi-droplet-fill"></i></span><span class="logo-text">BloodConnect<span>Connect.
                                Donate. Save.</span></span></a><button class="nav-toggle" aria-label="Toggle navigation"
                        aria-expanded="false"><i class="bi bi-list"></i></button>
                    <nav class="nav" id="mainNav"><a href="index.html" class="nav-link">Home</a><a href="about.html"
                            class="nav-link">About</a><a href="contact.html" class="nav-link">Contact</a><span
                            id="authLinks"></span></nav>
                </div>
            </div>
        </header>
        <main class="main">
            <section class="page-hero">
                <div class="container page-hero-inner">
                    <div class="fade-up"><span class="eyebrow"><i class="bi bi-file-medical"></i> Emergency
                            workflow</span>
                        <h1 class="page-title">Blood Request Form</h1>
                        <p class="page-subtitle">Create a frontend request record for coordinators and volunteers to
                            review.</p>
                    </div>
                    <div class="page-actions fade-up"><a href="requests.html" class="btn btn-secondary"><i
                                class="bi bi-list-ul"></i> All Requests</a></div>
                </div>
            </section>
            <section class="form-page">
                <div class="card auth-card fade-up">
                    <div class="card-body">
                        <form id="bloodRequestForm">
                            <div class="form-group"><label class="form-label" for="patientName">Patient Name <span
                                        class="required">*</span></label>
                                <div class="input-group"><input class="form-control" id="patientName" name="patientName"
                                        placeholder="Patient name" required><i class="bi bi-person input-icon"></i>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label class="form-label" for="bloodGroup">Blood Group <span
                                            class="required">*</span></label>
                                    <div class="input-group"><select class="form-control form-select" id="bloodGroup"
                                            name="bloodGroup" required>
                                            <option value="">Select group</option>
                                            <option>A+</option>
                                            <option>A-</option>
                                            <option>B+</option>
                                            <option>B-</option>
                                            <option>O+</option>
                                            <option>O-</option>
                                            <option>AB+</option>
                                            <option>AB-</option>
                                        </select><i class="bi bi-droplet input-icon"></i></div>
                                </div>
                                <div class="form-group"><label class="form-label" for="units">Units <span
                                            class="required">*</span></label>
                                    <div class="input-group"><input class="form-control" id="units" name="units"
                                            type="number" min="1" placeholder="Units needed" required><i
                                            class="bi bi-123 input-icon"></i></div>
                                </div>
                            </div>
                            <div class="form-group"><label class="form-label" for="hospital">Hospital <span
                                        class="required">*</span></label>
                                <div class="input-group"><input class="form-control" id="hospital" name="hospital"
                                        placeholder="Hospital name" required><i class="bi bi-building input-icon"></i>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label class="form-label" for="city">City <span
                                            class="required">*</span></label>
                                    <div class="input-group"><input class="form-control" id="city" name="city"
                                            placeholder="City" required><i class="bi bi-geo-alt input-icon"></i></div>
                                </div>
                                <div class="form-group"><label class="form-label" for="urgency">Urgency <span
                                            class="required">*</span></label>
                                    <div class="input-group"><select class="form-control form-select" id="urgency"
                                            name="urgency" required>
                                            <option value="">Select urgency</option>
                                            <option>Critical</option>
                                            <option>Today</option>
                                            <option>Scheduled</option>
                                        </select><i class="bi bi-clock input-icon"></i></div>
                                </div>
                            </div>
                            <div class="form-group"><label class="form-label" for="contact">Coordinator Contact</label>
                                <div class="input-group"><input class="form-control" id="contact" name="contact"
                                        placeholder="Phone number"><i class="bi bi-telephone input-icon"></i></div>
                            </div>
                            <div class="form-group"><label class="form-label" for="notes">Clinical Notes</label>
                                <div class="input-group"><textarea class="form-control" id="notes" name="notes"
                                        placeholder="Add relevant details" rows="4"></textarea></div>
                            </div>
                            <div class="form-actions"><button type="submit" class="btn btn-primary"
                                    id="requestSubmitBtn"><i class="bi bi-send"></i> Create Request</button><button
                                    type="reset" class="btn btn-secondary"><i class="bi bi-arrow-counterclockwise"></i>
                                    Reset</button></div>
                        </form>
                    </div>
                </div>
            </section>
        </main>
        <footer class="footer"></footer>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="script.js"></script>
</body>

</html>
