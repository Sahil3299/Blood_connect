<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - BloodConnect</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="design.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="container">
        <div class="header-inner">
          <a href="index.html" class="logo"><span class="logo-mark"><i class="bi bi-droplet-fill"></i></span><span class="logo-text">BloodConnect<span>Connect. Donate. Save.</span></span></a>
          <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false"><i class="bi bi-list"></i></button>
          <nav class="nav" id="mainNav"><a href="index.html" class="nav-link">Home</a><a href="about.html" class="nav-link">About</a><a href="contact.html" class="nav-link">Contact</a><span id="authLinks"></span></nav>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="page-hero">
        <div class="container page-hero-inner">
          <div class="fade-up"><span class="eyebrow"><i class="bi bi-lock"></i> Secure access</span><h1 class="page-title">Welcome back.</h1><p class="page-subtitle">Sign in to manage donor registrations, search the network, and coordinate requests.</p></div>
        </div>
      </section>

      <section class="form-page">
        <div class="card auth-card fade-up">
          <div class="card-body">
            <form id="loginForm">
              <div class="form-group"><label class="form-label" for="email">Email Address <span class="required">*</span></label><div class="input-group"><input id="email" name="email" type="email" class="form-control" placeholder="Enter your email" required autocomplete="email"><i class="bi bi-envelope input-icon"></i></div></div>
              <div class="form-group"><label class="form-label" for="password">Password <span class="required">*</span></label><div class="input-group"><input id="password" name="password" type="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password"><i class="bi bi-lock input-icon"></i></div></div>
              <div class="form-actions"><button type="submit" class="btn btn-primary"><span class="btn-text"><i class="bi bi-box-arrow-in-right"></i> Sign In</span></button></div>
              <p class="auth-note">Don't have an account? <a href="signup.html" class="text-link">Create one</a></p>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer"></footer>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="script.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/';
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Validation Error', 'Please fill in all fields.'); return; }
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.classList.add('btn-loading');
      try {
        const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email, password }) });
        const j = await res.json();
        if (res.ok) {
          localStorage.setItem('token', j.token);
          localStorage.setItem('user', JSON.stringify(j.user));
          showSuccess('Login Successful', 'Redirecting to home...');
          setTimeout(() => { window.location.href = '/'; }, 1000);
        } else {
          showError('Login Failed', j.message || 'Invalid credentials. Please try again.');
          submitBtn.disabled = false;
          submitBtn.classList.remove('btn-loading');
        }
      } catch(err) {
        showError('Network Error', 'Unable to connect to server. Please try again.');
        submitBtn.disabled = false;
        submitBtn.classList.remove('btn-loading');
      }
    });
  </script>
</body>
</html>
