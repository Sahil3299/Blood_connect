<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Edit Profile - BloodConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="design.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>
    <div class="shell">
        <header class="header">
            <div class="container">
                <div class="header-inner"><a href="index.html" class="logo"><span class="logo-mark"><i
                                class="bi bi-droplet-fill"></i></span><span class="logo-text">BloodConnect<span>Connect.
                                Donate. Save.</span></span></a><button class="nav-toggle" aria-label="Toggle navigation"
                        aria-expanded="false"><i class="bi bi-list"></i></button>
                    <nav class="nav" id="mainNav"><a href="index.html" class="nav-link">Home</a><a href="about.html"
                            class="nav-link">About</a><a href="contact.html" class="nav-link">Contact</a><span
                            id="authLinks"></span></nav>
                </div>
            </div>
        </header>
        <main class="main">
            <section class="page-hero">
                <div class="container page-hero-inner">
                    <div class="fade-up"><span class="eyebrow"><i class="bi bi-pencil-square"></i> Account
                            settings</span>
                        <h1 class="page-title">Edit Profile</h1>
                        <p class="page-subtitle">Update the local profile display used by the frontend experience.</p>
                    </div>
                </div>
            </section>
            <section class="form-page">
                <div class="card auth-card fade-up">
                    <div class="card-body">
                        <form id="profileForm">
                            <div class="form-group"><label class="form-label" for="name">Full Name <span
                                        class="required">*</span></label>
                                <div class="input-group"><input id="name" name="name" type="text" class="form-control"
                                        placeholder="Full name" required><i class="bi bi-person input-icon"></i></div>
                            </div>
                            <div class="form-group"><label class="form-label" for="email">Email <span
                                        class="required">*</span></label>
                                <div class="input-group"><input id="email" name="email" type="email"
                                        class="form-control" placeholder="Email address" required><i
                                        class="bi bi-envelope input-icon"></i></div>
                            </div>
                            <div class="form-actions"><button class="btn btn-primary" type="submit"><i
                                        class="bi bi-check2"></i> Save Changes</button><a class="btn btn-secondary"
                                    href="profile.html"><i class="bi bi-arrow-left"></i> Cancel</a></div>
                        </form>
                    </div>
                </div>
            </section>
        </main>
        <footer class="footer"></footer>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="script.js"></script>
</body>

</html>
